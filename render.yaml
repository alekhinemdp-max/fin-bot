services:
  - type: worker
    name: finbot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false          # заполнить вручную в дашборде
      - key: OPENAI_API_KEY
        sync: false          # заполнить вручную (опционально)
      - key: DATABASE_URL
        fromDatabase:
          name: finbot-db
          property: connectionString

databases:
  - name: finbot-db
    plan: free
